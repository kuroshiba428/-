<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上司タイプ一覧 | 上司病理診断</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fecfef);
    margin: 0;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    width: 100%;
    max-width: 1400px;
}

.card {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(25px);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    transition: transform 0.4s, box-shadow 0.4s;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 30px 60px rgba(0,0,0,0.25);
}

.card-content {
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.type-header {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
}

.type-bar {
    width: 10px;
    height: 40px;
    border-radius: 5px;
    margin-right: 10px;
    flex-shrink: 0;
}

.type-title {
    font-size: 1.2em;
    font-weight: 700;
    display: flex;
    align-items: center;
}

.type-icon {
    font-size: 22px;
    margin-left: 5px;
}

.card-content h3 {
    margin: 0 0 15px 0;
    font-size: 1em;
    font-style: italic;
    color: #666;
}

.card-content ul {
    list-style-type: none;
    padding-left: 0;
    margin: 0;
}

.card-content ul li {
    margin-bottom: 12px;
    font-size: 0.95em;
    line-height: 1.5em;
    color: #444;
    display: flex;
    flex-direction: column;
}

.card-content ul li .title-row {
    display: flex;
    align-items: center;
    margin-bottom: 4px;
}

.card-content ul li span.icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    margin-right: 8px;
    flex-shrink: 0;
}

.card-content ul li span.title {
    font-weight: 700;
    color: #333;
}

.card-content ul li span.text {
    display: block;
    white-space: pre-line;
    margin-left: 24px;
}

@media (max-width:768px) {
    .type-title { font-size: 1em; }
    .card-content h3 { font-size: 0.95em; }
}
</style>
</head>
<body>
<div class="container" id="container"></div>

<script>
const TYPE_COLORS = [
    "#e53e3e", "#ed8936", "#f6e05e", "#9f7aea", "#d53f8c",
    "#38a169", "#3182ce", "#dd6b20", "#805ad5", "#38b2ac",
    "#718096", "#f56565", "#ed64a6", "#ecc94b", "#48bb78"
];

const TYPES = [
{id:1, name:"馬鹿の山マネージャー", catchphrase:"「俺が言ってるんだよ？」", icon:"🐒🏔️", bias:"*ダニング＝クルーガー効果（能力が低いほど自己評価が過大になる認知バイアス）", description:`このタイプは、自信と実力のバランスが崩れており、能力より自己評価が大きく上回る傾向があります。

特徴は
• 強い自信
• フィードバック拒否
• 過去の経験の過信

本人は問題を感じていないことが多く、周囲のメンバーが修正役を担う構造になりがちです。`},
{id:2, name:"謝罪ボタン上司", catchphrase:"その謝罪、何回目？", icon:"🙇🙇", bias:"形式謝罪完結錯覚（謝罪＝「問題解決・責任終了」の魔法の言葉と思いこむ認知錯覚）", description:`このタイプは、問題が起きると素早く謝罪しますが、改善行動が伴わないことが多いのが特徴です。

結果として
ミス → 謝罪 → 再発 → 謝罪
というループが発生します。`},
{id:3, name:"「大人な対応」上司", catchphrase:"もしかして：責任者　不在", icon:"👈👉", bias:"責任分散（集団の中で、それぞれの認識意識が薄れる心理）", description:`このタイプは問題が発生した際、
• チーム全体
• 他の部署の役割
• 私生活の状況

などに責任を分散させ、明確な責任主体が消える構造を作りがちです。

一見すると事態を丸く収めたように見えますが、結果として、問題の解決が遅れます。`},
{id:4, name:"記憶改竄マネージャー", catchphrase:"「そんなこと言ってないよ、聞き間違えじゃない？」", icon:"❓❓", bias:"認知的不協和（「できる自分」のイメージと合わない情報が受け入れられないから「現実」を変えてしまう心理）", description:`このタイプは、自分の発言や判断が現実と矛盾したとき、
無意識に過去の発言を修正してしまう傾向があります。

本人に悪意がない場合も多いですが、
部下の混乱や自信喪失、チームの信頼関係の喪失につながる場合があります。
`},
{id:5, name:"人格攻撃型マネージャー", catchphrase:"気にしすぎ？怒りすぎ？", icon:"😡🗯️", bias:"根本的帰属の誤り（個人の性格の問題として整理し、本質（自分のマネジメント問題）に気づかない認知バイアス）", description:`このタイプは、問題が起きると 
• 性格 
• 協調性 
• 感情 など、
個人の人格に原因を求める傾向があります。 
これにより、構造的な問題が見えにくくなるだけでなく、
人格否定によりチーム関係が悪化する場合があります。

`},
{id:6, name:"またまたたまたま上司", catchphrase:"この「イレギュラー」、何回目？", icon:"🎲🎲", bias:"正常性バイアス（異常を「いつも通り」とみなし、深刻さが認められない認知バイアス）", description:`このタイプは、同じ問題が繰り返されても
 「今回はたまたま」 「偶然」 と扱うことで、
問題のパターン認識が起こらない特徴があります。

その結果、根本的問題の解決につながらず、
同じミスやトラブルが生じる場合があります。
`},
{id:7, name:"くちだけ神上司", catchphrase:"声は聞こえるが姿が見えない…", icon:"👼👼", bias:"モラルライセンシング（個人の性格の問題として整理し、本質（自分のマネジメント問題）に気づかない認知バイアス）", description:`このタイプは、
 「心配している」
 「サポートしたい」
 「少し休んだ方がいいんじゃない？」 
といった優しい、気遣った言葉が多いですが、
具体的な行動が伴わない、状況変化を推し進めない傾向があります。 

その結果、根本的問題の解決につながらず、
同じミスやトラブルが生じる場合があります。
`},
{id:8, name:"謎にどっしりマネージャー", catchphrase:"焦ってないけど、大丈夫そう？", icon:"🚬😎", bias:"単純化バイアス（複雑な問題を処理したがらず、単純なものと扱ってしまう認知バイアス）", description:`このタイプは、組織の問題を 
• 小さな出来事 
• 一時的トラブル 
として処理することで、
問題の全体構造を直視しない傾向があります。 

その結果、根本的問題の解決につながらず、
同じミスやトラブルが生じる場合があります。

`},
{id:9, name:"最強保身武装上司", catchphrase:"俺の辞書に反省という文字はない", icon:"🛡️🏰", bias:"防衛機制（自分の心を守るために、自分の非を認められない心理状況）", description:`このタイプは、合理化、否認、投影など
複数の心理防衛が働いており、
自己正当化が非常に強い状態で
何も言っても響かない傾向があります。 

その結果、チーム内の信頼関係の悪化、、
トラブル解決の遅延など、様々な問題が常態化する場合があります。

`},
{id:10, name:"懐古主義マネージャー", catchphrase:"エラー：バージョンが古いです。", icon:"💾💾", bias:"アンカリング効果（過去のある成功に錨（いかり）を下ろし、それが判断基準として動かなくなってしまう認知バイアス）", description:`このタイプは、過去の成功体験が強く、
新しい環境への適応が遅れる傾向があります。

その結果、非効率運用を維持したり
部下からの新しいアイデアを「経験」の名の下で無視し、
業務の改善を停滞させる場合があります。

`},
{id:11, name:"無言の圧マネージャー", catchphrase:"「…え、常識的にわかるでしょ？」", icon:"🙊💦", bias:"集団同調バイアス（周囲の期待や集団規範に合わせることを「当然」とし、明確な指示を出さず、結果として「察して」を強いる認知バイアス）", description:`このタイプは、 明確な指示より
 「察して」 「普通わかる」 といった文化を重視するため、
責任と指示が曖昧になりがちで確認しづらい「空気」を作る傾向があります。

その結果、スムーズなチームメイト同士のコミュニケーションが阻害され、
仕事に支障が出たり、部下のストレスとなる場合があります。

`},
{id:12, name:"マイクロマネジメント上司", catchphrase:"マリオネット部下誕生", icon:"👁👁", bias:"コントロール幻想（完璧主義や不安の結果、部下の行動を全て自分で管理できると錯覚し、過剰介入する認知バイアス）", description:`このタイプは、 細かい管理が多く、
部下の裁量が少ない環境を作ります。

結果として、部下のストレスの増加、自信喪失、
育成の失敗につながる傾向があります。

`},
{id:13, name:"感情爆発マネージャー", catchphrase:"「俺を怒らせるんじゃない！」", icon:"🤬💥", bias:"ホット・コグニション（論理的思考が感情にハイジャックされてしまい、冷静な判断ができない心理状態）", description:`このタイプは、問題が起きると怒りや感情で反応し、
冷静な問題解決より感情の発散を優先する場合があります。

その結果、問題の解決が図られないだけでなく
チーム内の人間関係にも悪影響を及ぼす場合があります。

`},
{id:14, name:"透明人間マネージャー", catchphrase:"「信頼してるよ、よろしくね」", icon:"👋😶‍🌫️", bias:"傍観者効果（誰かがやってくれるだろうと考え、個々の行動意欲が低下する心理現象）", description:`このタイプは、一見自由な環境に見えるものの 
• 意思決定がない 
• 仕事へのサポートがない 
• 責任も曖昧 
という状態に陥りやすく、 その結果、
様々問題が常態化する場合があります。

`},
{id:15, name:"健全マネージャー", catchphrase:"安心安全上司", icon:"💮💯", bias:"メタ認知機能（客観的に自分の状況を分析、把握する能力）", description:`このタイプは 
• フィードバック受容 
• 問題構造化 
• 改善行動 
を比較的バランスよく行います。
組織にとって安定したマネジメントと言えます。

`}
];

const container = document.getElementById('container');

TYPES.forEach((type, index) => {
    const color = TYPE_COLORS[index % TYPE_COLORS.length];
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
        <div class="card-content">
            <div class="type-header">
                <div class="type-bar" style="background:${color}"></div>
                <div class="type-title">
                    ${type.id}. ${type.name} 
                    <span class="type-icon">${type.icon}</span>
                </div>
            </div>
            <h3>${type.catchphrase}</h3>
            <ul>
                <li>
                    <div class="title-row">
                        <span class="icon" style="background:${color}"></span>
                        <span class="title">説明</span>
                    </div>
                    <span class="text">${type.description.replace(/\n/g,"<br>")}</span>
                </li>
                <li>
                    <div class="title-row">
                        <span class="icon" style="background:${color}"></span>
                        <span class="title">心理・認知バイアス</span>
                    </div>
                    <span class="text">${type.bias}</span>
                </li>
            </ul>
        </div>
    `;
    container.appendChild(card);
});
</script>
</body>
</html>
