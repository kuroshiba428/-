<style>

.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(25px);
    border-radius: 40px;
    padding: 30px;
    max-width: 700px;
    width: 100%;

.top-rank {

    margin-bottom: 25px;
    position: relative;
    overflow: hidden;
}
.top-rank::before {
    content: '🏆';
    position: absolute;
    font-size: 3em;
    top: -20px;
    right: -20px;
    opacity: 0.3;
}
.top-rank h3 {
    margin: 0 0 20px 0;
    font-size: 1.5em;
    text-align: center;
}

.rank-item {

.top-rank .rank-item:nth-of-type(1),
.top-rank .rank-item:nth-of-type(2), 
.top-rank .rank-item:nth-of-type(3) {

font-size: 1.6em;
color: #000000 !important;

.type p {

.type-icon { font-size: 2em; animation: bounce 2s infinite; }

span[style*="font-size:1.2em"] {
font-size: 1.1em !important;

div[style*="font-size:1.3em"] {

.description {

  [[15],[7],[3,6],[5,13]],
  // ㉒ 上司の説明
  [[15],[7],[3],[4]],
  // ㉓ 上司の成功談
  [[15],[2],[10],[4]],
  // ㉔ 同じトラブルの経験
  [[1,6],[2],[6,3],[4]],
  // ㉕ 上司の決断
  [[15],[10],[3],[4]],
  // ㉖ 上司の謝罪
  [[15],[2],[9],[4]],
  // ㉗ 職場の雰囲気
  [[15],[7],[11],[5]],
  // ㉘ 新しい環境・技術対応
  [[15],[7],[10],[4]],
  // ㉙ 指示がわかりにくいと伝えた時
  [[15],[11],[12],[4]],
  // ㉚ 判断ミス指摘時
  [[1],[2],[9],[5]]
];


   // 回答に応じてスコア加算
    data.forEach((answer, idx) => {
        const addTypes = typeMap[idx][answer - 1];
        addTypes.forEach(typeId => {
            scores[typeId - 1] += 1;
        });
    });

    // 結果に基づいて上位3タイプを決定
    const topTypes = scores
        .map((score, idx) => ({...TYPES[idx], score}))
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);

    const container = document.getElementById('resultContainer');

   // ランキング
// 🚀 ランキング（一番上・濃い色）
const rankDiv = document.createElement('div');
rankDiv.className = 'top-rank';
rankDiv.innerHTML = `
    <h3>🏆 あなたの上司のタイプは</h3>
    <div class="rank-item">
        <span>🥇 1位</span>  <!-- スペースはCSSで -->
        <span>${topTypes[0].name} ${topTypes[0].icon}</span>
        <span style="margin-left:auto;font-size:1.4em;">${topTypes[0].score}点</span>
    </div>
    <div class="rank-item">
        <span>🥈 2位</span>
        <span>${topTypes[1].name} ${topTypes[1].icon}</span>
        <span style="margin-left:auto;">${topTypes[1].score}点</span>
    </div>
    <div class="rank-item">
        <span>🥉 3位</span>
        <span>${topTypes[2].name} ${topTypes[2].icon}</span>
        <span style="margin-left:auto;">${topTypes[2].score}点</span>
    </div>
`;

container.appendChild(rankDiv);

    
   // タイプ詳細
// 詳細表示
// タイプ詳細（ランキングの下）
topTypes.forEach(type => {
    const div = document.createElement('div');
    div.className = 'type';
    div.innerHTML = `
        <h2>${type.icon} ${type.name}</h2>
        <p><strong>${type.catchphrase}</strong></p>
        <p>${type.description}</p>
      <div style="background:linear-gradient(90deg,#ff6b6b,#feca57);padding:15px;border-radius:15px;margin:10px 0;">
    <strong style="font-size:1.2em;">🧠 ヤバさの構造分析：</strong><br>
    <span style="font-size:1.0em; font-weight:bold;">${getBiasExplanation(type.bias)}</span><br>
    <span style="font-size:1.0em; color:#fff;">${type.bias.split('（')[1]?.replace('）','') || '詳細分析'}</span>
</div>

    `;
    container.appendChild(div);
});

// 👇 チャートはforEachの直後（1回だけ！）
const chartDiv = document.createElement('div');
chartDiv.className = 'chart-container';
chartDiv.innerHTML = '<canvas id="scoreChart"></canvas>';
container.appendChild(chartDiv);


// バーチャート作成（全15タイプ）→ 横棒グラフに変更
setTimeout(() => {
    const ctx = document.getElementById('scoreChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
          　labels: TYPES.map(t => t.name.slice(0,12)),  // アイコンなし
            datasets: [{
                label: 'ヤバさスコア',
                data: scores,
                backgroundColor: 'rgba(255, 107, 107, 0.8)',
                borderColor: 'rgba(255, 107, 107, 1)',
                borderWidth: 2,
                borderRadius: 10,
                borderSkipped: false,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            indexAxis: 'y',  // 横グラフ
            scales: {
                x: { beginAtZero: true, max: 20, ticks: { color: 'white', font: { size: 12 } }, grid: { color: 'rgba(255,255,255,0.1)' } },
                y: { 
    ticks: { 
        color: 'white', 
        maxRotation: 0, 
        font: { size: 11 },  // 少し小さく
        padding: 10
    } 
}
            },
            plugins: {
                legend: { labels: { color: 'white', font: { size: 14 } } }
            }
        }
    });
}, 200);

}

window.onload = getResults;
</script>
</body>
</html>
